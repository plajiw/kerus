<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerus</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <script>
        (function () {
            try {
                const savedPrefs = localStorage.getItem('ficha_tecnica_prefs');
                if (!savedPrefs) return;
                const parsed = JSON.parse(savedPrefs);
                let themeMode = parsed.themeMode;
                if (themeMode !== 'light' && themeMode !== 'dark' && themeMode !== 'system') {
                    if (parsed.isDarkMode === true || parsed.isDarkMode === 'true') themeMode = 'dark';
                    if (parsed.isDarkMode === false || parsed.isDarkMode === 'false') themeMode = 'light';
                }
                if (themeMode !== 'light' && themeMode !== 'dark' && themeMode !== 'system') return;
                const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
                const useDark = themeMode === 'dark' || (themeMode === 'system' && prefersDark);
                document.documentElement.classList.toggle('dark', useDark);
                document.documentElement.dataset.theme = useDark ? 'dark' : 'light';
                document.documentElement.dataset.themeMode = themeMode;
                document.documentElement.style.colorScheme = useDark ? 'dark' : 'light';
                if (document.body) {
                    document.body.classList.toggle('dark', useDark);
                }
            } catch {
                // Ignore theme boot errors
            }
        })();
    </script>
    <script>
        window.tailwind = {
            config: {
                darkMode: 'class',
                theme: {
                    extend: {
                        fontFamily: {
                            sans: ['Manrope', 'sans-serif'],
                        },
                    },
                },
            },
        };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Merriweather:wght@400;600;700&family=Oswald:wght@400;600&display=swap');

        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9fafb;
        }

        html.dark body {
            background-color: #0b0b0c;
        }

        :root {
            --radius-lg: 14px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --border: #d9d9d9;
            --shadow-1: 0 8px 20px rgba(0, 0, 0, 0.08);
            --surface-0: #ffffff;
            --surface-1: #f5f5f5;
            --surface-2: #e8e8e8;
            --surface-3: #d3d3d3;
            --ink-0: #1a1a1a;
            --ink-1: #4a4a4a;
            --ink-2: #757575;

            /* ── Control height tokens ─────────────────────────────
               All interactive controls (button, input, select,
               icon-button) share a single height so rows stay
               optically aligned without manual adjustments.
               sm  = 32px  compact lists / inline filters
               md  = 36px  standard (default)
               lg  = 44px  hero / title inputs                      */
            --h-control-sm: 32px;
            --h-control:    36px;
            --h-control-lg: 44px;

            /* Horizontal padding tokens */
            --px-control:   12px;
            --px-btn:       16px;

            /* Font size tokens */
            --text-control: 13px;
            --text-label:   11px;   /* uppercase tracking labels    */
        }

        html.dark {
            --surface-0: #0f0f0f;
            --surface-1: #1a1a1a;
            --surface-2: #2a2a2a;
            --surface-3: #3a3a3a;
            --ink-0: #f5f5f5;
            --ink-1: #d0d0d0;
            --ink-2: #a0a0a0;
            --border: #3a3a3a;
            --shadow-1: 0 10px 22px rgba(0, 0, 0, 0.4);
        }

        .rounded-2xl {
            border-radius: var(--radius-lg) !important;
        }

        .rounded-xl {
            border-radius: var(--radius-md) !important;
        }

        .rounded-3xl {
            border-radius: var(--radius-lg) !important;
        }

        .rounded-lg,
        .rounded {
            border-radius: var(--radius-sm) !important;
        }

        .ds-card {
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--surface-1);
            box-shadow: var(--shadow-1);
        }

        .ds-panel {
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            background: var(--surface-2);
        }

        .ds-input,
        .ds-select,
        .ds-textarea {
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
            background: var(--surface-1);
            color: var(--ink-0);
            outline: none;
            transition: all 0.2s ease;
        }

        .ds-input:focus,
        .ds-select:focus,
        .ds-textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(var(--primary-rgb, 59, 130, 246), 0.1);
        }

        /* ── Input ────────────────────────────────────────────── */
        .ds-input {
            height: var(--h-control);
            padding: 0 var(--px-control);
            font-size: var(--text-control);
        }

        .ds-input::-webkit-outer-spin-button,
        .ds-input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .ds-input[type=number] {
            -moz-appearance: textfield;
        }

        /* Number input spinners styling */
        .ds-input[type="number"]::-webkit-outer-spin-button,
        .ds-input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: inner-spin-button !important;
            display: flex;
            height: 100%;
            opacity: 0.5;
        }

        .ds-input-lg {
            height: var(--h-control-lg);
            padding: 0 14px;
        }

        /* ── Select ───────────────────────────────────────────── */
        .ds-select {
            height: var(--h-control);
            padding: 0 var(--px-control);
            font-size: var(--text-control);
            cursor: pointer;
        }

        /* ── Textarea ─────────────────────────────────────────── */
        .ds-textarea {
            padding: 12px;
            min-height: 120px;
            font-size: var(--text-control);
        }

        /* ── Button (ghost / secondary) ───────────────────────── */
        .ds-button {
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--ink-1);
            height: var(--h-control);
            padding: 0 var(--px-btn) !important;
            font-size: var(--text-control) !important;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            line-height: 1;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .ds-button:hover {
            background-color: var(--surface-2);
        }

        .ds-button:active {
            transform: scale(0.98);
        }

        /* ── Button primary ───────────────────────────────────── */
        .ds-button-primary {
            border-radius: var(--radius-sm);
            border: 1px solid var(--primary);
            background: var(--primary);
            color: #ffffff;
            height: var(--h-control);
            padding: 0 var(--px-btn) !important;
            font-size: var(--text-control) !important;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
            line-height: 1;
            transition: all 0.2s ease;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(var(--primary-rgb, 59, 130, 246), 0.2);
        }

        .ds-button-primary:hover {
            filter: brightness(1.1);
            box-shadow: 0 4px 12px rgba(var(--primary-rgb, 59, 130, 246), 0.3);
        }

        .ds-button-primary:active {
            transform: scale(0.98);
        }

        /* ── Icon button (square, icon only) ──────────────────── */
        .ds-icon-button {
            width: var(--h-control);
            height: var(--h-control);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--ink-1);
            transition: all 0.2s ease;
            cursor: pointer;
            flex-shrink: 0;
        }

        .ds-icon-button:hover {
            background-color: var(--surface-2);
        }

        /* ── Skeleton / shimmer ────────────────────────────────── */
        @keyframes kerus-shimmer {
            to { background-position: -200% center; }
        }

        .skeleton {
            background: linear-gradient(
                90deg,
                var(--surface-2) 25%,
                var(--surface-3) 50%,
                var(--surface-2) 75%
            );
            background-size: 200% auto;
            animation: kerus-shimmer 1.4s linear infinite;
            border-radius: var(--radius-sm);
        }

        /* ── Loading overlay ───────────────────────────────────── */
        .loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 9000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            animation: kerus-fade-in 0.15s ease;
        }

        .loading-card {
            background: var(--surface-0);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        @keyframes kerus-spin {
            to { transform: rotate(360deg); }
        }

        .loading-spinner {
            width: 28px;
            height: 28px;
            border: 3px solid var(--surface-3);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: kerus-spin 0.7s linear infinite;
            flex-shrink: 0;
        }

        @keyframes kerus-fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .ds-drop {
            border-radius: var(--radius-md);
            border: 2px dashed var(--border);
            background: var(--surface-1);
        }

        html.dark .bg-slate-950 {
            background-color: var(--surface-0) !important;
        }

        html.dark .bg-slate-900,
        html.dark .bg-neutral-900 {
            background-color: var(--surface-1) !important;
        }

        html.dark .bg-slate-800,
        html.dark .bg-neutral-800 {
            background-color: var(--surface-2) !important;
        }

        html.dark .border-slate-800,
        html.dark .border-neutral-800,
        html.dark .border-slate-700 {
            border-color: #2a2d32 !important;
        }

        html.dark .text-slate-300,
        html.dark .text-slate-400 {
            color: #a1a8b5 !important;
        }

        html.dark .text-slate-500 {
            color: #8a94a3 !important;
        }

        html:not(.dark) .border-slate-200 {
            border-color: #cbd5e1;
        }

        html:not(.dark) .border-slate-200\/70 {
            border-color: rgba(203, 213, 225, 0.9);
        }

        html:not(.dark) .border-slate-200\/80 {
            border-color: rgba(203, 213, 225, 0.95);
        }

        html:not(.dark) .text-slate-400 {
            color: #64748b;
        }

        html:not(.dark) .text-slate-500 {
            color: #475569;
        }

        .print-pages {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .print-compact {
            padding: 24px !important;
        }

        .print-compact .print-header {
            margin-bottom: 16px !important;
            padding-bottom: 12px !important;
        }

        .print-compact .print-title {
            margin-bottom: 24px !important;
        }

        .print-compact .print-section {
            margin-bottom: 18px !important;
        }

        .print-compact .print-table th,
        .print-compact .print-table td {
            padding-top: 6px !important;
            padding-bottom: 6px !important;
        }

        .print-steps {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .print-compact .print-step-text,
        .print-compact .print-observations-text {
            line-height: 1.35 !important;
        }

        .print-compact .print-observations {
            padding-top: 14px !important;
        }

        .print-compact .print-footer {
            margin-top: 20px !important;
            padding-top: 10px !important;
        }

        .print-continuation {
            border-bottom: 1px dashed rgba(148, 163, 184, 0.6);
            color: #94a3b8;
            font-size: 0.7em;
            letter-spacing: 0.28em;
            margin-bottom: 16px;
            padding-bottom: 6px;
            text-align: center;
            text-transform: uppercase;
        }

        /* ── Rich text editor — list styles ───────────────────── */
        .rte-editor ul, .rte-output ul {
            list-style-type: disc;
            padding-left: 1.5rem;
            margin: 0.25rem 0;
        }

        .rte-editor ol, .rte-output ol {
            list-style-type: decimal;
            padding-left: 1.5rem;
            margin: 0.25rem 0;
        }

        .rte-editor li, .rte-output li {
            margin: 0.15rem 0;
        }

        .rte-editor b, .rte-output b,
        .rte-editor strong, .rte-output strong {
            font-weight: 700;
        }

        .rte-editor i, .rte-output i,
        .rte-editor em, .rte-output em {
            font-style: italic;
        }

        .rte-output p { margin: 0.25rem 0; }

        /* ── Illustration ──────────────────────────────────────── */
        .recipe-illustration svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .print-title--with-illustration {
            padding-right: 96px;
        }

        .print-illustration {
            position: absolute;
            right: 0;
            top: -6px;
            width: 86px;
            height: 86px;
            opacity: 0.85;
        }

        .print-measure {
            position: absolute !important;
            left: -9999px !important;
            top: 0 !important;
            visibility: hidden !important;
            pointer-events: none !important;
        }

        @media print {
            @page {
                size: A4;
                margin: 0;
            }

            .no-print {
                display: none !important;
            }

            body {
                background-color: white;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }

            .print-page,
            .print-page * {
                overflow: visible !important;
            }

            .print-area {
                box-shadow: none !important;
                border: none !important;
            }

            .print-page {
                width: 210mm;
                height: 297mm;
            }

            .print-table {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .print-table thead {
                display: table-header-group;
            }

            .print-row,
            .print-section,
            tr {
                break-inside: avoid;
                page-break-inside: avoid;
            }

            .print-pages {
                gap: 0;
            }

            .print-page {
                break-after: page;
                page-break-after: always;
            }

            .print-page--last {
                break-after: auto;
                page-break-after: auto;
            }

            .print-measure {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
